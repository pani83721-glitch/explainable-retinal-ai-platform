<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retinal AI - Patient Readmission Risk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-top: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .risk-red { background-color: #dc3545; color: white; }
        .risk-yellow { background-color: #ffc107; color: black; }
        .risk-green { background-color: #198754; color: white; }
        .indicator-badge { font-size: 0.9rem; margin-right: 5px; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">Explainable Retinal AI Platform</a>
    </div>
</nav>

<div class="container mb-5">
    <div class="row mt-4">
        <!-- Form Column -->
        <div class="col-md-7">
            <div class="card">
                <div class="card-header bg-white font-weight-bold">Patient Data Entry</div>
                <div class="card-body">
                    <form id="predictionForm">
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Age Range</label>
                                <select name="age" class="form-select">
                                    <option value="[50-60)">[50-60)</option>
                                    <option value="[0-10)">[0-10)</option>
                                    <option value="[10-20)">[10-20)</option>
                                    <option value="[20-30)">[20-30)</option>
                                    <option value="[30-40)">[30-40)</option>
                                    <option value="[40-50)">[40-50)</option>
                                    <option value="[60-70)">[60-70)</option>
                                    <option value="[70-80)">[70-80)</option>
                                    <option value="[80-90)">[80-90)</option>
                                    <option value="[90-100)">[90-100)</option>
                                </select>
                            </div>
                            <div class="col">
                                <label class="form-label">Gender</label>
                                <select name="gender" class="form-select">
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Previous Inpatient Visits</label>
                                <input type="number" name="number_inpatient" class="form-control" value="0">
                            </div>
                            <div class="col">
                                <label class="form-label">Emergency Visits</label>
                                <input type="number" name="number_emergency" class="form-control" value="0">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Num Medications</label>
                                <input type="number" name="num_medications" class="form-control" value="10">
                            </div>
                            <div class="col">
                                <label class="form-label">Time in Hospital (days)</label>
                                <input type="number" name="time_in_hospital" class="form-control" value="3">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">A1C Result</label>
                                <select name="A1Cresult" class="form-select">
                                    <option value="None">None</option>
                                    <option value="Norm">Normal</option>
                                    <option value=">7">>7</option>
                                    <option value=">8">>8</option>
                                </select>
                            </div>
                            <div class="col">
                                <label class="form-label">Insulin Dosage</label>
                                <select name="insulin" class="form-select">
                                    <option value="No">No</option>
                                    <option value="Steady">Steady</option>
                                    <option value="Up">Up (Increase)</option>
                                    <option value="Down">Down (Decrease)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Primary Diagnosis (ICD-9 Code)</label>
                            <input type="text" name="diag_1" class="form-control" placeholder="e.g. 250.02 (Diabetes)" value="250">
                        </div>

                        <hr>
                        <h6>Quick Test Cases:</h6>
                        <div class="btn-group w-100 mb-3" role="group">
                            <button type="button" class="btn btn-outline-danger btn-sm" onclick="fillCase('red')">High Risk Case</button>
                            <button type="button" class="btn btn-outline-warning btn-sm" onclick="fillCase('yellow')">Medium Risk Case</button>
                            <button type="button" class="btn btn-outline-success btn-sm" onclick="fillCase('green')">Low Risk Case</button>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Analyze Risk Profile</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Result Column -->
        <div class="col-md-5">
            <div id="resultCard" class="card d-none">
                <div id="resultHeader" class="card-header text-center py-3 font-weight-bold">
                    PREDICTION RESULT
                </div>
                <div class="card-body">
                    <h2 id="riskLevel" class="text-center mb-1">---</h2>
                    <p id="probability" class="text-center text-muted small">Score: 0.0</p>

                    <div class="alert alert-info mt-3">
                        <strong>Recommendation:</strong><br>
                        <span id="recommendation">---</span>
                    </div>

                    <div id="indicatorSection">
                        <h6>Explainable Risk Indicators:</h6>
                        <div id="indicators" class="mt-2">
                            <!-- Indicators will be injected here -->
                        </div>
                    </div>
                </div>
            </div>

            <div id="loading" class="text-center mt-5 d-none">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p>Consulting Model...</p>
            </div>
        </div>
    </div>
</div>

<script>
    const CASES = {
        red: { age: "[70-80)", number_inpatient: 6, number_emergency: 3, num_medications: 25, A1Cresult: ">8", diag_1: "250.02", insulin: "Up", time_in_hospital: 10 },
        yellow: { age: "[50-60)", number_inpatient: 1, number_emergency: 1, num_medications: 15, A1Cresult: "Norm", diag_1: "414", insulin: "No", time_in_hospital: 4 },
        green: { age: "[30-40)", number_inpatient: 0, number_emergency: 0, num_medications: 8, A1Cresult: "None", diag_1: "250", insulin: "No", time_in_hospital: 2 }
    };

    function fillCase(type) {
        const data = CASES[type];
        const form = document.getElementById('predictionForm');
        for (let key in data) {
            if (form.elements[key]) form.elements[key].value = data[key];
        }
    }

    document.getElementById('predictionForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(e.target);
        const jsonData = Object.fromEntries(formData.entries());

        document.getElementById('resultCard').classList.add('d-none');
        document.getElementById('loading').classList.remove('d-none');

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(jsonData)
            });
            const result = await response.json();

            displayResult(result);
        } catch (error) {
            alert('Error connecting to model');
        } finally {
            document.getElementById('loading').classList.add('d-none');
        }
    });

    function displayResult(res) {
        const card = document.getElementById('resultCard');
        const header = document.getElementById('resultHeader');
        const riskLvl = document.getElementById('riskLevel');

        card.classList.remove('d-none');
        header.className = 'card-header text-center py-3 font-weight-bold';

        if (res.risk_level === 'Red') header.classList.add('risk-red');
        else if (res.risk_level === 'Yellow') header.classList.add('risk-yellow');
        else header.classList.add('risk-green');

        riskLvl.innerText = res.risk_level;
        document.getElementById('probability').innerText = `Hybrid Risk Score: ${res.probability}`;
        document.getElementById('recommendation').innerText = res.recommendation;

        const indicatorsDiv = document.getElementById('indicators');
        indicatorsDiv.innerHTML = '';

        if (res.clinical_indicators) {
            for (let [key, value] of Object.entries(res.clinical_indicators)) {
                const badge = document.createElement('span');
                badge.className = `badge indicator-badge ${value ? 'bg-danger' : 'bg-secondary'}`;
                badge.innerText = key.replace(/_/g, ' ');
                indicatorsDiv.appendChild(badge);
            }
        }
    }
</script>
</body>
</html>
